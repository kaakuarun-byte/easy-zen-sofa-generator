<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Easy Zen - Premium AI Sofa Studio. Transform your sofa product photos into luxury catalog and editorial photography with advanced AI." />
    <meta name="keywords" content="Easy Zen, AI Sofa Studio, AI catalog photography, AI furniture staging, luxury interior staging AI" />
    <title>Easy Zen - Premium AI Sofa Studio</title>
    <script>
      (function() {
        // Stub window.WebSocket to prevent Vite client from throwing connection errors
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          const ProxyWebSocket = function(url, protocols) {
            if (url && (String(url).includes('/vite') || String(url).includes('ws:') || String(url).includes('wss:'))) {
              const mockSocket = {
                url: url,
                readyState: 0, // CONNECTING
                bufferedAmount: 0,
                extensions: "",
                protocol: protocols || "",
                binaryType: "blob",
                listeners: {},
                send: function() {},
                close: function() {},
                addEventListener: function(type, callback) {
                  if (!this.listeners[type]) this.listeners[type] = [];
                  this.listeners[type].push(callback);
                },
                removeEventListener: function(type, callback) {
                  if (!this.listeners[type]) return;
                  this.listeners[type] = this.listeners[type].filter(cb => cb !== callback);
                },
                onopen: null,
                onerror: null,
                onclose: null,
                onmessage: null
              };

              // Safely simulate open state to satisfy the client and avoid unhandled rejections
              setTimeout(() => {
                mockSocket.readyState = 1; // OPEN
                const openEvent = { type: 'open', target: mockSocket };
                if (typeof mockSocket.onopen === 'function') {
                  try { mockSocket.onopen(openEvent); } catch(e) {}
                }
                if (mockSocket.listeners['open']) {
                  mockSocket.listeners['open'].forEach(cb => {
                    try { cb(openEvent); } catch(e) {}
                  });
                }
              }, 10);

              return mockSocket;
            }
            return new OriginalWebSocket(url, protocols);
          };
          
          ProxyWebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
          ProxyWebSocket.OPEN = OriginalWebSocket.OPEN;
          ProxyWebSocket.CLOSING = OriginalWebSocket.CLOSING;
          ProxyWebSocket.CLOSED = OriginalWebSocket.CLOSED;
          
          window.WebSocket = ProxyWebSocket;
        }

        // Suppress expected benign WebSocket/HMR errors in the AI Studio environment
        const isWebSocketError = (msg) => {
          if (!msg) return false;
          const lower = String(msg).toLowerCase();
          return (
            lower.includes('websocket') || 
            lower.includes('web socket') ||
            lower.includes('failed to connect') ||
            lower.includes('closed without opened') ||
            lower.includes('hmr')
          );
        };

        // Intercept global unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason;
          const msg = reason && (reason.message || String(reason)) || '';
          if (isWebSocketError(msg)) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
          }
        }, true);

        // Intercept global uncaught errors
        window.addEventListener('error', function(event) {
          const msg = event.message || '';
          if (isWebSocketError(msg)) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
          }
        }, true);

        // Intercept console.error and console.warn calls
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const combined = args.map(arg => String(arg)).join(' ');
          if (isWebSocketError(combined)) {
            return;
          }
          originalConsoleError.apply(console, args);
        };

        const originalConsoleWarn = console.warn;
        console.warn = function(...args) {
          const combined = args.map(arg => String(arg)).join(' ');
          if (isWebSocketError(combined)) {
            return;
          }
          originalConsoleWarn.apply(console, args);
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
